services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mylaravel_app
    working_dir: /var/www/html
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/var/www/html

  nginx:
    image: nginx:1.27-alpine
    container_name: mylaravel_nginx
    depends_on:
      - app
    ports:
      - "8096:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  node:
    image: node:22-alpine
    container_name: mylaravel_node
    working_dir: /var/www/html
    tty: true
    ports:
      - "5173:5173"
    volumes:
      - ./src:/var/www/html

  db:
    image: mysql:8.0
    container_name: mylaravel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mylaravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
